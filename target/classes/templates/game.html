<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title th:text="${puzzle.title}">Nonogram</title>
        <link rel="stylesheet" th:href="@{/static/css/game.css}">
    
</head>
<body>

<header>
    <button onclick="saveAndGoHome()" style="background:none; border:none; color:#aad4f5; cursor:pointer; font-size:1rem; text-decoration:underline;">
    ← Retour au Menu
</button>
    <h1 th:text="${puzzle.title}">Puzzle</h1>
    <p>
        <span th:text="${puzzle.niveau}"></span>
        &nbsp;|&nbsp;
        <span th:text="${puzzle.gridSize} + ' x ' + ${puzzle.gridSize}"></span>
    </p>
</header>

<!-- ── WIN overlay ──────────────────────────────────────── -->
<div id="winOverlay" class="overlay" style="display:none; flex-direction:column;">
    <div class="overlay-box" style="background:#27ae60;">
        <div class="emoji">🏆</div>
        <h2>Vous avez gagné !</h2>
        <img id="winImage" src="" alt="Solution pixel art"
             style="display:none; width:160px; height:160px;
                    image-rendering:pixelated; border:3px solid white;
                    border-radius:8px; margin-bottom:14px;"/>
        <p>Score final : <strong id="winScore">0</strong></p>

        <!-- Next level button — only if next exists -->
        <a th:if="${hasNextLevel}"
           th:href="@{/play/{id}(id=${nextLevelId})}"
           class="overlay-btn green">
             Niveau Suivant
        </a>
        <a th:href="@{/home}" class="overlay-btn ghost"> Accueil</a>
    </div>
</div>

<!-- ── GAME OVER overlay ─────────────────────────────────── -->
<div id="gameOverOverlay" class="overlay" style="display:none; flex-direction:column;">
    <div class="overlay-box" style="background:#e74c3c;">
        <div class="emoji">💀</div>
        <h2>Game Over</h2>
        <p>Trop d'erreurs sur ce puzzle.</p>
        <a th:href="@{/play/{id}(id=${puzzle.id})}" class="overlay-btn red">🔄 Réessayer</a>
        <a th:href="@{/home}" class="overlay-btn ghost">🏠 Menu</a>
    </div>
</div>

<main>
    <div class="mode-toggle">
        <button id="btnFill" class="active">■ Remplir</button>
        <button id="btnMark">✕ Marquer</button>
    </div>

    <div class="grid-container">
        <div id="grid-wrapper"></div>
    </div>

    <!-- ── 3 action buttons ──────────────────────────────── -->
    <div class="controls">
        <button class="btn success" id="checkBtn">✅ Vérifier</button>
        <button class="btn warning" id="saveBtn">💾 Sauvegarder</button>
        <button class="btn danger"  id="newBtn">🔄 Nouvelle</button>
    </div>

    <div id="message"></div>
</main>

<!-- hidden inputs -->
<input type="hidden" id="data-solution"   th:value="${puzzle.solutionJson}"/>
<input type="hidden" id="data-rowclues"   th:value="${puzzle.rowCluesJson}"/>
<input type="hidden" id="data-colclues"   th:value="${puzzle.colCluesJson}"/>
<input type="hidden" id="data-size"       th:value="${puzzle.gridSize}"/>
<input type="hidden" id="data-partieId"   th:value="${partieId}"/>
<input type="hidden" id="data-score"      th:value="${scoreDepart}"/>
<input type="hidden" id="data-maxErreurs" th:value="${puzzle.maxErreurs}"/>
<input type="hidden" id="data-imageUrl"   th:value="${puzzle.imageUrl}"/>
<input type="hidden" id="ctx"             th:value="${contextPath}"/>
<input type="hidden" id="data-grille-courante" th:value="${grilleCourante}"/>
<input type="hidden" id="data-nb-erreurs"   th:value="${nbErreurs}"/>
<input type="hidden" id="data-temps-ecoule" th:value="${tempsEcoule}"/>
<script>
// ── Read server data ──────────────────────────────────────
const ctx        = document.getElementById('ctx').value;
const solution   = document.getElementById('data-solution').value;
const rowClues   = document.getElementById('data-rowclues').value;
const colClues   = document.getElementById('data-colclues').value;
const size       = parseInt(document.getElementById('data-size').value);
const partieId   = parseInt(document.getElementById('data-partieId').value);
const maxErreurs = parseInt(document.getElementById('data-maxErreurs').value) || 0;
const imageUrl   = document.getElementById('data-imageUrl').value;

const sol    = JSON.parse(solution);
const rowC   = JSON.parse(rowClues);
const colC   = JSON.parse(colClues);
const solFlat = sol.flat();

const userGrid = Array(size * size).fill(0);
let mode        = 'fill';
let score       = parseInt(document.getElementById('data-score').value) || 0;
let nbErreurs   = parseInt(document.getElementById('data-nb-erreurs').value)   || 0;
let tempsEcoule = parseInt(document.getElementById('data-temps-ecoule').value) || 0;
let gameEnded   = false;

// ── Timer ─────────────────────────────────────────────────
setInterval(() => { if (!gameEnded) tempsEcoule++; }, 1000);

// ── Build table ───────────────────────────────────────────
const wrapper = document.getElementById('grid-wrapper');
const table   = document.createElement('table');
table.className    = 'nonogram';
table.dataset.size = size;

//Prevent browser back button — replace history state
history.pushState(null, '', window.location.href);
window.addEventListener('popstate', () => {
    saveAndGoHome();
});

const headRow = document.createElement('tr');
const corner  = document.createElement('td');
corner.className = 'corner';
headRow.appendChild(corner);

colC.forEach(clue => {
    const td = document.createElement('td');
    td.className = 'col-clue';
    (clue.length ? clue : [0]).forEach(num => {
        const div = document.createElement('div');
        div.textContent = num === 0 ? '' : num;
        td.appendChild(div);
    });
    headRow.appendChild(td);
});
table.appendChild(headRow);

for (let r = 0; r < size; r++) {
    const tr = document.createElement('tr');
    const clueCell = document.createElement('td');
    clueCell.className = 'row-clue';
    clueCell.textContent = rowC[r].length ? rowC[r].join(' ') : '0';
    tr.appendChild(clueCell);
    for (let c = 0; c < size; c++) {
        const td = document.createElement('td');
        td.className = 'cell';
        td.dataset.row = r;
        td.dataset.col = c;
        td.addEventListener('click', () => clickCell(td, r, c));
        tr.appendChild(td);
    }
    table.appendChild(tr);
}
wrapper.appendChild(table);

// ── Mode toggle ───────────────────────────────────────────
document.getElementById('btnFill').addEventListener('click', () => setMode('fill'));
document.getElementById('btnMark').addEventListener('click', () => setMode('mark'));

function setMode(m) {
    mode = m;
    document.getElementById('btnFill').classList.toggle('active', m === 'fill');
    document.getElementById('btnMark').classList.toggle('active', m === 'mark');
}

function clickCell(cell, r, c) {
    if (gameEnded || cell.classList.contains('locked') || cell.classList.contains('wrong-instant')) return;
    const index = r * size + c;

    if (mode === 'fill') {
        const isFilledNow = userGrid[index] === 1;
        if (isFilledNow) {
            // Toggle off
            userGrid[index] = 0;
            cell.classList.remove('filled');
            cell.textContent = '';
        } else {
            if (solFlat[index] === 1) {
                // Correct cell
                userGrid[index] = 1;
                cell.classList.add('filled');
                cell.classList.remove('marked');
                cell.textContent = '';
                checkAutoWin();
            } else {
                // Wrong cell — instant red + X, locked
                userGrid[index] = 3;
                cell.classList.add('wrong-instant', 'locked');
                cell.textContent = '✕';
                nbErreurs++;
                sendUpdate();
                if (maxErreurs > 0 && nbErreurs >= maxErreurs) {
                    setTimeout(() => handleGameOver(), 400);
                }
                return;
            }
        }
    } else {
        userGrid[index] = userGrid[index] === 2 ? 0 : 2;
        cell.classList.toggle('marked', userGrid[index] === 2);
        cell.classList.remove('filled');
        cell.textContent = userGrid[index] === 2 ? '✕' : '';
    }
    sendUpdate();
}
// ── Auto win check — called after every correct fill ─────
function checkAutoWin() {
    for (let i = 0; i < size * size; i++) {
        if (solFlat[i] === 1 && userGrid[i] !== 1) return;
    }
    handleWin();
}

// ── Current grid as 2D JSON string ───────────────────────
function currentGridJson() {
    return JSON.stringify(
        Array.from({length: size}, (_, r) =>
            Array.from({length: size}, (_, c) => userGrid[r * size + c])
        )
    );
}

// ── Send update on every click ────────────────────────────
function sendUpdate() {
    fetch('/nonogram/api/partie/update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({
            partieId, grilleCourante: currentGridJson(),
            scoreActuel: score, nbErreurs, tempsEcoule
        })
    });
}

// ── VÉRIFIER button (optional progress check) ─────────────
document.getElementById('checkBtn').addEventListener('click', () => {
    if (gameEnded) return;
    let filled = 0;
    let total = solFlat.filter(v => v === 1).length;
    for (let i = 0; i < size * size; i++) {
        if (solFlat[i] === 1 && userGrid[i] === 1) filled++;
    }
    if (filled === total) {
        handleWin();
    } else {
        showMessage(`🔍 ${filled} / ${total} cases correctes remplies.`, '#2980b9');
        setTimeout(() => showMessage('', ''), 2500);
    }
});

// ── SAUVEGARDER button ────────────────────────────────────
document.getElementById('saveBtn').addEventListener('click', () => {
    if (gameEnded) return;
    fetch('/nonogram/api/partie/sauvegarder', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            partieId, grilleCourante: currentGridJson(),
            scoreActuel: score, nbErreurs, tempsEcoule
        })
    }).then(r => r.json()).then(() => {
        showMessage('💾 Partie sauvegardée !', '#2980b9');
        setTimeout(() => showMessage('', ''), 2000);
    });
});

// ── NOUVELLE button — resets the grid ────────────────────
document.getElementById('newBtn').addEventListener('click', () => {
    if (!confirm('Commencer une nouvelle partie ? La progression non sauvegardée sera perdue.')) return;

    // Reset state
    userGrid.fill(0);
    nbErreurs   = 0;
    tempsEcoule = 0;
    gameEnded   = false;
    score       = parseInt(document.getElementById('data-score').value) || 0;

    // Reset all cells visually
    document.querySelectorAll('.cell').forEach(c => {
        c.className  = 'cell';
        c.textContent = '';
        c.style.background     = '';
        c.style.animationDelay = '';
    });

    showMessage('', '');

    // Tell backend to quit current partie and start fresh
    fetch('/nonogram/api/partie/quitter', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',

        body: JSON.stringify({ partieId })
    }).then(() => {
        // Reload the page to get a fresh partieId from the server
        window.location.reload();
    });
});

// ── Win ───────────────────────────────────────────────────
function handleWin() {
    gameEnded = true;
    document.querySelectorAll('.cell').forEach(c => c.classList.add('locked'));
    showMessage('🎉 Félicitations ! Vous avez gagné !', '#27ae60');

    // Collect filled cells for pixel reveal
    const filled = [];
    for (let r = 0; r < size; r++)
        for (let c = 0; c < size; c++)
            if (sol[r][c] === 1) filled.push({r, c});

    // Staggered pixel reveal
    filled.forEach(({r, c}, i) => {
        const cell = table.querySelector(`[data-row="${r}"][data-col="${c}"]`);
        cell.classList.remove('filled', 'marked', 'correct');
        cell.textContent = '';
        setTimeout(() => {
            cell.style.background = '#27ae60';
            cell.classList.add('pixel-win');
            setTimeout(() => {
                cell.classList.remove('pixel-win');
                cell.classList.add('pixel-wave');
                cell.style.animationDelay = (Math.random() * 0.5) + 's';
            }, 400);
        }, i * 25);
    });

    // Show overlay after reveal finishes
    const delay = filled.length * 25 + 600;
    setTimeout(() => {
        document.getElementById('winScore').textContent = score;
        if (imageUrl) {
            const img = document.getElementById('winImage');
            img.src = imageUrl;
            img.classList.add('visible');
        }
        document.getElementById('winOverlay').style.display = 'flex';
    }, delay);

    // Notify backend
    fetch('/nonogram/api/partie/terminer', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',

        body: JSON.stringify({ partieId, scoreFinal: score })
    });
}

// ── Game over ─────────────────────────────────────────────
function handleGameOver() {
    gameEnded = true;
    document.querySelectorAll('.cell').forEach(c => c.classList.add('locked'));
    showMessage('💀 Game Over ! Trop d\'erreurs.', '#e74c3c');
    document.getElementById('gameOverOverlay').style.display = 'flex';
    fetch('/nonogram/api/partie/gameover', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',

        body: JSON.stringify({ partieId })
    });
}

// ── Message helper ────────────────────────────────────────
function showMessage(text, color) {
    const msg = document.getElementById('message');
    msg.textContent = text;
    msg.style.color = color;
}

// ── Keyboard shortcuts ────────────────────────────────────
document.addEventListener('keydown', e => {
    if (e.key === 'f' || e.key === 'F') { setMode('fill'); e.preventDefault(); }
    if (e.key === 'm' || e.key === 'M') { setMode('mark'); e.preventDefault(); }
    if (e.key === 'Enter') { document.getElementById('checkBtn').click(); e.preventDefault(); }
});
//── Restore saved grid if resuming ────────────────────────
const savedGridRaw = document.getElementById('data-grille-courante').value;
if (savedGridRaw && savedGridRaw !== 'null') {
    const savedGrid = JSON.parse(savedGridRaw);

    for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
            const val = savedGrid[r][c];  // ← read from savedGrid not userGrid
            userGrid[r * size + c] = val; // ← update userGrid

            const cell = table.querySelector(`[data-row="${r}"][data-col="${c}"]`);
            if (val === 1) {
                cell.classList.add('filled');
            } else if (val === 2) {
                cell.classList.add('marked');
                cell.textContent = '✕';
            } else if (val === 3) {
                cell.classList.add('wrong-instant', 'locked');
                cell.textContent = '✕';
            }
        }
    }
}
//── Render saved grid state on cells ─────────────────────
if (savedGridRaw && savedGridRaw !== 'null') {
    for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
            const val = userGrid[r * size + c];
            const cell = table.querySelector(`[data-row="${r}"][data-col="${c}"]`);
            if (val === 1) {
                cell.classList.add('filled');
            } else if (val === 2) {
                cell.classList.add('marked');
                cell.textContent = '✕';
            }
        }
    }
}

function saveAndGoHome() {
    if (gameEnded) {
        window.location.href = '/nonogram/home';
        return;
    }
    // Save first then redirect
    fetch('/nonogram/api/partie/sauvegarder', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            partieId,
            grilleCourante: currentGridJson(),
            scoreActuel: score,
            nbErreurs,
            tempsEcoule
        })
    }).then(() => {
        window.location.href = '/nonogram/home';
    });
}
</script>
</body>
</html>
